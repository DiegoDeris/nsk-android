      - name: Create MainActivity
        run: |
          cat > app/src/main/java/com/neuroshield/nsk/MainActivity.kt << 'ENDOFFILE'
package com.neuroshield.nsk
import android.app.AppOpsManager
import android.content.Context
import android.content.Intent
import android.content.SharedPreferences
import android.os.Build
import android.os.Bundle
import android.provider.Settings
import android.view.View
import androidx.appcompat.app.AppCompatActivity
import androidx.work.*
import com.google.zxing.integration.android.IntentIntegrator
import com.neuroshield.nsk.databinding.ActivityMainBinding
import java.util.concurrent.TimeUnit
class MainActivity : AppCompatActivity() {
    private lateinit var binding: ActivityMainBinding
    private lateinit var prefs: SharedPreferences
    override fun onCreate(savedInstanceState: Bundle?) {
        super.onCreate(savedInstanceState)
        binding = ActivityMainBinding.inflate(layoutInflater)
        setContentView(binding.root)
        prefs = getSharedPreferences("nsk", Context.MODE_PRIVATE)
        refresh()
        binding.btnScanQr.setOnClickListener { startQrScan() }
        binding.btnPermission.setOnClickListener { openUsageSettings() }
        binding.btnDisconnect.setOnClickListener { disconnect() }
    }
    override fun onResume() { super.onResume(); refresh() }
    private fun refresh() {
        val token = prefs.getString("ingest_token", null)
        val hasPermission = hasUsagePermission()
        when {
            token == null -> showStep(Step.SCAN)
            !hasPermission -> showStep(Step.PERMISSION)
            else -> { showStep(Step.ACTIVE); scheduleSync() }
        }
    }
    private fun showStep(step: Step) {
        binding.layoutScan.visibility = if (step == Step.SCAN) View.VISIBLE else View.GONE
        binding.layoutPermission.visibility = if (step == Step.PERMISSION) View.VISIBLE else View.GONE
        binding.layoutActive.visibility = if (step == Step.ACTIVE) View.VISIBLE else View.GONE
    }
    private fun startQrScan() {
        IntentIntegrator(this).apply {
            setPrompt("Escanea el QR de configuracion de NSK")
            setBeepEnabled(false); setOrientationLocked(true); initiateScan()
        }
    }
    @Deprecated("Deprecated in Java")
    override fun onActivityResult(requestCode: Int, resultCode: Int, data: Intent?) {
        val result = IntentIntegrator.parseActivityResult(requestCode, resultCode, data)
        if (result != null && result.contents != null) {
            val token = result.contents.trim()
            if (token.length >= 16) { prefs.edit().putString("ingest_token", token).apply(); refresh() }
        } else { super.onActivityResult(requestCode, resultCode, data) }
    }
    private fun hasUsagePermission(): Boolean {
        val appOps = getSystemService(Context.APP_OPS_SERVICE) as AppOpsManager
        val mode = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q)
            appOps.unsafeCheckOpNoThrow(AppOpsManager.OPSTR_GET_USAGE_STATS, android.os.Process.myUid(), packageName)
        else @Suppress("DEPRECATION") appOps.checkOpNoThrow(AppOpsManager.OPSTR_GET_USAGE_STATS, android.os.Process.myUid(), packageName)
        return mode == AppOpsManager.MODE_ALLOWED
    }
    private fun openUsageSettings() { startActivity(Intent(Settings.ACTION_USAGE_ACCESS_SETTINGS)) }
    private fun disconnect() {
        WorkManager.getInstance(this).cancelAllWorkByTag("nsk_sync")
        prefs.edit().remove("ingest_token").apply(); refresh()
    }
    private fun scheduleSync() {
        val request = PeriodicWorkRequestBuilder<SyncWorker>(15, TimeUnit.MINUTES)
            .addTag("nsk_sync")
            .setConstraints(Constraints.Builder().setRequiredNetworkType(NetworkType.CONNECTED).build())
            .build()
        WorkManager.getInstance(this).enqueueUniquePeriodicWork("nsk_sync", ExistingPeriodicWorkPolicy.KEEP, request)
    }
    enum class Step { SCAN, PERMISSION, ACTIVE }
}
ENDOFFILE

