name: Bootstrap project files
on:
  workflow_dispatch:
jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create directory structure
        run: |
          mkdir -p app/src/main/java/com/neuroshield/nsk
          mkdir -p app/src/main/res/values
          mkdir -p gradle/wrapper

      - name: Write source files
        run: |
          echo '' | base64 -d > build.gradle
          echo 'cm9vdFByb2plY3QubmFtZSA9ICJOZXVyb1NoaWVsZEtpZHMiCmluY2x1ZGUgJzphcHAnCg==' | base64 -d > settings.gradle
          echo '' | base64 -d > app/build.gradle
          echo 'ZGlzdHJpYnV0aW9uQmFzZT1HUkFETEVfVVNFUl9IT01FCmRpc3RyaWJ1dGlvblBhdGg9d3JhcHBlci9kaXN0cwpkaXN0cmlidXRpb25Vcmw9aHR0cHNcOi8vc2VydmljZXMuZ3JhZGxlLm9yZy9kaXN0cmlidXRpb25zL2dyYWRsZS04LjItYmluLnppcAp6aXBTdG9yZUJhc2U9R1JBRExFX1VTRVJfSE9NRQp6aXBTdG9yZVBhdGg9d3JhcHBlci9kaXN0cwo=' | base64 -d > gradle/wrapper/gradle-wrapper.properties
          echo 'LWtlZXAgY2xhc3MgY29tLm5ldXJvc2hpZWxkLm5zay4qKiB7ICo7IH0K' | base64 -d > app/proguard-rules.pro
          echo 'Ki5pbWwKLmdyYWRsZQovbG9jYWwucHJvcGVydGllcwovLmlkZWEKLkRTX1N0b3JlCi9idWlsZAovY2FwdHVyZXMKLmV4dGVybmFsTmF0aXZlQnVpbGQKLmN4eApsb2NhbC5wcm9wZXJ0aWVzCg==' | base64 -d > .gitignore
          echo '' | base64 -d > app/src/main/AndroidManifest.xml
          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPk5ldXJvU2hpZWxkIEtpZHM8L3N0cmluZz4KPC9yZXNvdXJjZXM+Cg==' | base64 -d > app/src/main/res/values/strings.xml
          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHlsZSBuYW1lPSJBcHBUaGVtZSIgcGFyZW50PSJUaGVtZS5BcHBDb21wYXQuTGlnaHQuTm9BY3Rpb25CYXIiLz4KPC9yZXNvdXJjZXM+Cg==' | base64 -d > app/src/main/res/values/themes.xml
          echo '' | base64 -d > app/src/main/java/com/neuroshield/nsk/BootReceiver.kt
          echo '' | base64 -d > app/src/main/java/com/neuroshield/nsk/UsageHelper.kt
          echo '' | base64 -d > app/src/main/java/com/neuroshield/nsk/SyncWorker.kt
          echo '' | base64 -d > app/src/main/java/com/neuroshield/nsk/MainActivity.kt

      - name: Commit all files
        run: |
          git config user.email 'github-actions@github.com'
          git config user.name 'GitHub Actions'
          git add .
          git diff --staged --quiet || git commit -m 'chore: add Android project source files [skip ci]'
          git push
