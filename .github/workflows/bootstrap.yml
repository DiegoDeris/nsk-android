      - name: Create Kotlin source files
        run: |
          cat > app/src/main/java/com/neuroshield/nsk/BootReceiver.kt << 'ENDOFFILE'
package com.neuroshield.nsk
import android.content.BroadcastReceiver
import android.content.Context
import android.content.Intent
import androidx.work.*
import java.util.concurrent.TimeUnit
class BootReceiver : BroadcastReceiver() {
    override fun onReceive(context: Context, intent: Intent) {
        if (intent.action != Intent.ACTION_BOOT_COMPLETED) return
        val prefs = context.getSharedPreferences("nsk", Context.MODE_PRIVATE)
        val token = prefs.getString("ingest_token", null) ?: return
        val request = PeriodicWorkRequestBuilder<SyncWorker>(15, TimeUnit.MINUTES)
            .addTag("nsk_sync")
            .setConstraints(Constraints.Builder().setRequiredNetworkType(NetworkType.CONNECTED).build())
            .build()
        WorkManager.getInstance(context).enqueueUniquePeriodicWork(
            "nsk_sync", ExistingPeriodicWorkPolicy.KEEP, request)
    }
}
ENDOFFILE

