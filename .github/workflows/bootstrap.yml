package com.neuroshield.nsk
import android.content.Context
import android.content.SharedPreferences
import androidx.work.CoroutineWorker
import androidx.work.WorkerParameters
import kotlinx.coroutines.Dispatchers
import kotlinx.coroutines.withContext
import okhttp3.MediaType.Companion.toMediaType
import okhttp3.OkHttpClient
import okhttp3.Request
import okhttp3.RequestBody.Companion.toRequestBody
import org.json.JSONArray
import org.json.JSONObject
import java.util.concurrent.TimeUnit
class SyncWorker(context: Context, params: WorkerParameters) : CoroutineWorker(context, params) {
    companion object {
        const val SUPABASE_URL = "https://lqvgspmjfkfdurdnejzs.supabase.co"
        const val ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxxdmczcG1qZmtmZHVyZG5lanpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDc1NzY1NDUsImV4cCI6MjA2MzE1MjU0NX0.M7UVtCuFfGpz3JNuqA-vBkVMGjkNfQhc3KJmj80cEGE"
        const val PREFS_LAST_SYNC = "last_sync_ms"
    }
    private val client = OkHttpClient.Builder()
        .connectTimeout(15, TimeUnit.SECONDS).writeTimeout(15, TimeUnit.SECONDS).readTimeout(15, TimeUnit.SECONDS).build()
    override suspend fun doWork(): Result = withContext(Dispatchers.IO) {
        try {
            val prefs: SharedPreferences = applicationContext.getSharedPreferences("nsk", Context.MODE_PRIVATE)
            val token = prefs.getString("ingest_token", null) ?: return@withContext Result.success()
            val lastSync = prefs.getLong(PREFS_LAST_SYNC, System.currentTimeMillis() - 90 * 60 * 1000)
            val events = UsageHelper.getEventsSince(applicationContext, lastSync)
            if (events.isEmpty()) return@withContext Result.success()
            events.chunked(500).forEach { chunk ->
                val eventsJson = JSONArray().apply {
                    chunk.forEach { e -> put(JSONObject().apply {
                        put("app_name", e.appName); put("duration_seconds", e.durationSeconds)
                        put("occurred_at", e.occurredAt); put("event_type", e.eventType)
                    })}
                }
                val body = JSONObject().apply { put("token", token); put("events", eventsJson) }
                    .toString().toRequestBody("application/json".toMediaType())
                val request = Request.Builder()
                    .url("$SUPABASE_URL/functions/v1/ingest-usage")
                    .addHeader("apikey", ANON_KEY).addHeader("Authorization", "Bearer $ANON_KEY")
                    .post(body).build()
                val response = client.newCall(request).execute()
                if (!response.isSuccessful) return@withContext Result.retry()
                response.close()
            }
            prefs.edit().putLong(PREFS_LAST_SYNC, System.currentTimeMillis()).apply()
            Result.success()
        } catch (e: Exception) { Result.retry() }
    }
}
