          cat > app/src/main/java/com/neuroshield/nsk/UsageHelper.kt << 'ENDOFFILE'
package com.neuroshield.nsk
import android.app.usage.UsageEvents
import android.app.usage.UsageStatsManager
import android.content.Context
data class AppUsageEvent(val appName: String, val durationSeconds: Int, val occurredAt: String, val eventType: String)
object UsageHelper {
    fun getEventsSince(context: Context, sinceMs: Long): List<AppUsageEvent> {
        val usm = context.getSystemService(Context.USAGE_STATS_SERVICE) as UsageStatsManager
        val now = System.currentTimeMillis()
        val events = mutableListOf<AppUsageEvent>()
        val foregroundStart = mutableMapOf<String, Long>()
        val usageEvents = usm.queryEvents(sinceMs, now)
        val event = UsageEvents.Event()
        while (usageEvents.hasNextEvent()) {
            usageEvents.getNextEvent(event)
            val pkg = event.packageName ?: continue
            when (event.eventType) {
                UsageEvents.Event.MOVE_TO_FOREGROUND -> {
                    foregroundStart[pkg] = event.timeStamp
                    events.add(AppUsageEvent(getAppLabel(context, pkg), 0, isoTime(event.timeStamp), "session_start"))
                }
                UsageEvents.Event.MOVE_TO_BACKGROUND -> {
                    val start = foregroundStart.remove(pkg) ?: continue
                    val dur = ((event.timeStamp - start) / 1000).toInt().coerceIn(0, 86400)
                    if (dur > 0) events.add(AppUsageEvent(getAppLabel(context, pkg), dur, isoTime(start), "app_usage"))
                }
                UsageEvents.Event.SCREEN_INTERACTIVE ->
                    events.add(AppUsageEvent("screen", 0, isoTime(event.timeStamp), "screen_on"))
                UsageEvents.Event.SCREEN_NON_INTERACTIVE ->
                    events.add(AppUsageEvent("screen", 0, isoTime(event.timeStamp), "screen_off"))
            }
        }
        foregroundStart.forEach { (pkg, start) ->
            val dur = ((now - start) / 1000).toInt().coerceIn(0, 86400)
            if (dur > 0) events.add(AppUsageEvent(getAppLabel(context, pkg), dur, isoTime(start), "app_usage"))
        }
        return events
    }
    private fun getAppLabel(context: Context, packageName: String): String {
        return try {
            val pm = context.packageManager
            pm.getApplicationLabel(pm.getApplicationInfo(packageName, 0)).toString()
        } catch (e: Exception) { packageName.substringAfterLast('.') }
    }
    private fun isoTime(ms: Long): String {
        return java.text.SimpleDateFormat("yyyy-MM-dd'T'HH:mm:ss'Z'", java.util.Locale.US).apply {
            timeZone = java.util.TimeZone.getTimeZone("UTC")
        }.format(java.util.Date(ms))
    }
}
ENDOFFILE

